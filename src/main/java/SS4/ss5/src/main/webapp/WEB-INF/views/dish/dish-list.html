<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{dish/layout/Header}">
<head>
    <title>Danh sách món ăn</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          crossorigin="anonymous">
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <h2>Danh sách món ăn</h2>
        <table class="table table-striped table-responsive">
            <thead class="thead-dark">
            <tr>
                <th>ID</th>
                <th>Tên món</th>
                <th>Giá</th>
                <th>Tình trạng</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="dish : ${dishes}">
                <td th:text="${dish.id}"></td>
                <td th:text="${dish.name}"></td>
                <td th:text="${dish.price}"></td>
                <td>
                    <span th:if="${dish.available}" class="text-success">Còn hàng</span>
                    <span th:unless="${dish.available}" class="text-danger">Hết hàng</span>
                </td>
                <td>
                    <a th:href="@{|/edit-dish/${dish.id}|}" class="btn btn-sm btn-primary">Chỉnh sửa</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    </div>
</div>
</body>
</html>
