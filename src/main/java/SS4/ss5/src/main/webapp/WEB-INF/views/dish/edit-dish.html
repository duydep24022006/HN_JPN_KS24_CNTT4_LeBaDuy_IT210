<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{dish/layout/Header}">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa món ăn</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          crossorigin="anonymous">
</head>
<body>
<main layout:fragment="content">
    <div class="container mt-4">
        <h2>Chỉnh sửa món ăn</h2>

        <form th:object="${dish}" th:action="@{/update}" method="post" class="mt-3">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label for="name">Tên món</label>
                <input type="text" id="name" th:field="*{name}" class="form-control"/>
            </div>

            <div class="form-group">
                <label for="price">Giá</label>
                <input type="number" id="price" th:field="*{price}" class="form-control"/>
            </div>

            <div class="form-group">
                <label for="available">Tình trạng</label>
                <select id="available" th:field="*{available}" class="form-control">
                    <option th:value="true">Còn hàng</option>
                    <option th:value="false">Hết hàng</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success">Cập nhật</button>
            <a th:href="@{/dish}" class="btn btn-secondary">Quay lại danh sách</a>
        </form>

        <div th:if="${errorMessage}" class="alert alert-danger mt-3" th:text="${errorMessage}"></div>
    </div>
</main>
</body>
</html>
