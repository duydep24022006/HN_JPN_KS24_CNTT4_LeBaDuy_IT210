<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${gadgetId != null} ? 'Cập nhật thiết bị' : 'Thêm thiết bị'">Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="container mt-4">

<h2 th:text="${gadgetId != null} ? 'Cập nhật thiết bị' : 'Thêm thiết bị mới'"></h2>

<!-- Action tự động đổi giữa save và update -->
<form th:action="${gadgetId != null} ? @{'/gadgets/update/' + ${gadgetId}} : @{/gadgets/save}"
      th:object="${gadgetDto}"
      method="post"
      enctype="multipart/form-data">

    <div class="form-group">
        <label>Tên sản phẩm</label>
        <input type="text" th:field="*{productName}" class="form-control"/>
        <p th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}" style="color:red"></p>
    </div>

    <div class="form-group">
        <label>Thương hiệu</label>
        <input type="text" th:field="*{brand}" class="form-control"/>
        <p th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}" style="color:red"></p>
    </div>

    <div class="form-group">
        <label>Số lượng tồn kho</label>
        <input type="number" th:field="*{stockQuantity}" class="form-control"/>
        <p th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}" style="color:red"></p>
    </div>

    <div class="form-group">
        <label>Ảnh sản phẩm</label>

        <!-- Hiển thị ảnh hiện tại nếu đang edit -->
        <div th:if="${currentImage != null}" class="mb-2">
            <img th:src="@{'/images/' + ${currentImage}}" width="80" height="80"
                 style="object-fit:cover; border:1px solid #ddd; border-radius:4px;"/>
            <p class="text-muted small">Chọn ảnh mới để thay thế, hoặc bỏ qua để giữ ảnh cũ</p>
        </div>

        <input type="file" name="productImage" class="form-control-file"/>
        <p th:if="${#fields.hasErrors('productImage')}" th:errors="*{productImage}" style="color:red"></p>
    </div>

    <button type="submit" class="btn btn-primary">Lưu</button>
    <a th:href="@{/gadgets}" class="btn btn-secondary ml-2">Hủy</a>
</form>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" crossorigin="anonymous"></script>
</body>
</html>
