<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task-Form</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<form th:object="${task}" th:action="@{/form}" th:method="post">
    <div class="form-group">
        <label for="id">Id</label>
        <input type="text" th:field="*{id}" class="form-control">
        <div th:if="${#fields.hasErrors('id')}" th:errors="*{id}" class="text-danger"></div>
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" th:field="*{title}" class="form-control">
        <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger"></div>
    </div>

    <div class="form-group">
        <label for="deadline">Deadline</label>
        <input type="date" th:field="*{deadline}" class="form-control">
        <div th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}" class="text-danger"></div>
    </div>

    <div class="form-group">
        <label for="priority">Priority</label>
        <select class="form-control" th:field="*{priority}">
            <option th:value="HIGH">HIGH</option>
            <option th:value="MEDIUM">MEDIUM</option>
            <option th:value="LOW">LOW</option>
        </select>
        <div th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}" class="text-danger"></div>
    </div>

    <button type="submit" class="btn btn-primary">Thêm</button>
</form>


<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
